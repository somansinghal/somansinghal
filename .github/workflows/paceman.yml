name: Generate Pacman Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate pacman graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          username: somansinghal

      - name: Deploy pacman
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
